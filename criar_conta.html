<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRI System</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/iUwP1jk.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0c0c0c;
            --card: #131313;
            --border: #1f1f1f;
            --border2: #2c2c2c;
            --input: #0c0c0c;
            --text: #efefef;
            --muted: #505050;
            --muted2: #787878;
            --white: #fff;
            --danger: #d95555;
            --success: #4caf7d;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border2); }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            padding: 24px 16px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(#ffffff06 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
        }

        .wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 360px;
            animation: up 0.45s cubic-bezier(0.16,1,0.3,1) both;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding: 0 2px;
        }

        .topbar-item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px 22px 20px;
            position: relative;
            overflow: hidden;
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0; left: 15%; right: 15%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffffff12, transparent);
        }

        .avatar-section {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
        }

        .avatar-wrap { position: relative; flex-shrink: 0; }

        .avatar-img {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            border: 1.5px solid var(--border2);
            background: #0c0c0c;
            object-fit: cover;
            display: block;
            image-rendering: pixelated;
        }

        .avatar-ring {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 1px solid var(--border);
            pointer-events: none;
        }

        .avatar-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9.5px;
            color: var(--muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .avatar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--white);
            letter-spacing: -0.4px;
            line-height: 1;
        }

        .avatar-sub {
            font-size: 12px;
            color: var(--muted2);
            margin-top: 3px;
        }

        .sep { height: 1px; background: var(--border); margin: 0 0 20px; }

        .error-box {
            background: rgba(217,85,85,0.07);
            border: 1px solid rgba(217,85,85,0.2);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 14px;
            color: var(--danger);
            font-size: 11.5px;
            display: none;
            align-items: center;
            gap: 7px;
        }

        .error-box.show { display: flex; animation: glitch 0.18s ease; }

        .step { display: none; }
        .step.active { display: block; }

        .fields { display: flex; flex-direction: column; gap: 9px; margin-bottom: 18px; }

        .field { position: relative; }

        .field i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            color: var(--muted);
            pointer-events: none;
            transition: color 0.2s;
        }

        .field input {
            width: 100%;
            height: 42px;
            padding: 0 13px 0 36px;
            background: var(--input);
            border: 1px solid var(--border2);
            border-radius: 10px;
            color: var(--white);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input::placeholder { color: #2e2e2e; }
        .field input:focus { border-color: #444; }
        .field:has(input:focus) i { color: var(--muted2); }

        .btn {
            width: 100%;
            height: 42px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: opacity 0.15s, transform 0.1s, background 0.2s;
        }

        .btn:active { transform: scale(0.98); }
        .btn-solid { background: var(--white); color: #0c0c0c; }
        .btn-solid:hover { background: #e8e8e8; }
        .btn-solid:disabled { opacity: 0.35; cursor: not-allowed; }

        .btn-success-state {
            background: rgba(76,175,125,0.12);
            border: 1px solid rgba(76,175,125,0.3);
            color: var(--success);
            cursor: default;
        }

        .spinner {
            width: 13px; height: 13px;
            border: 2px solid rgba(0,0,0,0.15);
            border-top-color: #0c0c0c;
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            display: none;
        }

        .instrucao {
            font-size: 12px;
            color: var(--muted2);
            text-align: center;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .instrucao strong {
            color: var(--text);
            font-weight: 500;
        }

        .code-btn {
            width: 100%;
            height: 52px;
            background: var(--input);
            border: 1px solid var(--border2);
            border-radius: 10px;
            color: var(--white);
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 14px;
            transition: border-color 0.2s;
        }

        .code-btn:hover { border-color: #444; }

        .code-btn i { font-size: 14px; color: var(--muted2); letter-spacing: 0; }

        .timer-row {
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .timer-row span { color: var(--muted2); }

        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 7px;
            margin-top: 14px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 11.5px;
            color: var(--muted2);
            line-height: 1.5;
        }

        .info-row i { flex-shrink: 0; margin-top: 1px; font-size: 13px; }

        .footer-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            color: var(--muted);
            font-size: 11.5px;
            text-decoration: none;
            margin-top: 16px;
            transition: color 0.2s;
        }

        .footer-link:hover { color: var(--muted2); }

        @keyframes up {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes glitch {
            0%   { transform: translateX(-3px); }
            50%  { transform: translateX(2px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>
<div class="wrap">

    <div class="topbar">
        <div class="topbar-item">
            <div class="dot"></div>
            v2.1.1
        </div>
        <div class="topbar-item" id="clock">--:--:--</div>
    </div>

    <div class="card">
        <div class="avatar-section">
            <div class="avatar-wrap">
                <img src="https://www.habbo.com.br/habbo-imaging/avatarimage?&user=Padrao&action=std&direction=3&head_direction=3&img_format=png&gesture=sml&headonly=0&size=l"
                     alt="Avatar" class="avatar-img" id="avatarPreview">
                <div class="avatar-ring"></div>
            </div>
            <div>
                <div class="avatar-label">DRI System</div>
                <div class="avatar-title" id="cardTitle">Criar conta</div>
                <div class="avatar-sub" id="cardSub">Preencha os dados abaixo</div>
            </div>
        </div>

        <div class="sep"></div>

        <div class="error-box" id="errorMessage">
            <i class="ph ph-warning" style="font-size:13px;flex-shrink:0;"></i>
            <span id="errorText"></span>
        </div>

        <div id="step1" class="step active">
            <div class="fields">
                <div class="field">
                    <i class="ph ph-user"></i>
                    <input type="text" id="nick" placeholder="Usuário" autocomplete="off" autofocus>
                </div>
                <div class="field">
                    <i class="ph ph-lock-simple"></i>
                    <input type="password" id="senha" placeholder="Senha">
                </div>
                <div class="field">
                    <i class="ph ph-lock-simple-open"></i>
                    <input type="password" id="confirmarSenha" placeholder="Confirme a senha">
                </div>
            </div>
            <button class="btn btn-solid" id="btnCriar" onclick="criarConta()">
                <span id="btnCriarText">Continuar</span>
                <div class="spinner" id="btnCriarLoading"></div>
            </button>
        </div>

        <div id="step2" class="step">
            <div class="instrucao">Cole na <strong>missão do Habbo</strong> para verificar</div>
            <button class="code-btn" id="codigoBtn" onclick="copiarCodigo()">
                <span id="codigoVerificacao">A-123</span>
                <i class="ph ph-copy"></i>
            </button>
            <div class="timer-row">Expira em <span id="timer">5:00</span></div>
            <div class="info-row">
                <i class="ph ph-info"></i>
                A verificação acontece automaticamente assim que você colocar o código na missão.
            </div>
        </div>

        <div id="step3" class="step">
            <button class="btn btn-success-state" disabled>
                <i class="ph ph-check-circle" style="font-size:15px;"></i>
                Sucesso! Entrando...
            </button>
        </div>
    </div>

    <a href="index.html" class="footer-link">
        <i class="ph ph-arrow-left" style="font-size:13px;"></i>
        Voltar para o login
    </a>
</div>

<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/session.js"></script>
<script src="js/version-checker.js"></script>
<script>
    (function tick() {
        const el = document.getElementById('clock');
        if (el) el.textContent = new Date().toLocaleTimeString('pt-BR');
        setTimeout(tick, 1000);
    })();

    let codigoAtual = '';
    let nickAtual = '';
    let senhaAtual = '';
    let timerInterval;
    let verificacaoInterval;
    let tempoRestante = 300;
    let verificando = false;

    document.getElementById('nick').addEventListener('input', function() {
        const v = this.value.trim();
        document.getElementById('avatarPreview').src = v
            ? `https://www.habbo.com.br/habbo-imaging/avatarimage?&user=${v}&action=std&direction=3&head_direction=3&img_format=png&gesture=sml&headonly=0&size=l`
            : `https://www.habbo.com.br/habbo-imaging/avatarimage?&user=Padrao&action=std&direction=3&head_direction=3&img_format=png&gesture=sml&headonly=0&size=l`;
    });

    async function criarConta() {
        const nick = document.getElementById('nick').value.trim();
        const senha = document.getElementById('senha').value;
        const confirmar = document.getElementById('confirmarSenha').value;

        if (!nick || !senha || !confirmar) { showError('Preencha todos os campos'); return; }
        if (senha !== confirmar) { showError('As senhas não coincidem'); return; }
        if (nick.length < 3) { showError('Nick deve ter pelo menos 3 caracteres'); return; }
        if (senha.length < 4) { showError('Senha deve ter pelo menos 4 caracteres'); return; }

        const btn = document.getElementById('btnCriar');
        const txt = document.getElementById('btnCriarText');
        const spinner = document.getElementById('btnCriarLoading');

        txt.style.display = 'none';
        spinner.style.display = 'block';
        btn.disabled = true;

        const senhaHash = await Utils.hashPassword(senha);
        const resultado = await Auth.criarConta(nick, senhaHash);

        if (resultado.success) {
            nickAtual = resultado.nick;
            codigoAtual = resultado.codigo;
            senhaAtual = senha;

            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            document.getElementById('codigoVerificacao').textContent = codigoAtual;
            document.getElementById('cardTitle').textContent = 'Verificação';
            document.getElementById('cardSub').textContent = 'Cole o código na missão';

            iniciarTimer();
            iniciarVerificacaoAutomatica();
        } else {
            showError(resultado.message);
            txt.style.display = '';
            spinner.style.display = 'none';
            btn.disabled = false;
        }
    }

    function copiarCodigo() {
        navigator.clipboard.writeText(codigoAtual);
        const btn = document.getElementById('codigoBtn');
        const orig = btn.innerHTML;
        btn.innerHTML = '<span style="letter-spacing:2px;font-size:13px;">COPIADO</span> <i class="ph ph-check" style="letter-spacing:0;font-size:14px;"></i>';
        setTimeout(() => { btn.innerHTML = orig; }, 2000);
    }

    function iniciarTimer() {
        tempoRestante = 300;
        atualizarTimer();
        timerInterval = setInterval(() => {
            tempoRestante--;
            atualizarTimer();
            if (tempoRestante <= 0) {
                clearInterval(timerInterval);
                clearInterval(verificacaoInterval);
                showError('Código expirado. Tente novamente.');
                setTimeout(() => window.location.reload(), 2000);
            }
        }, 1000);
    }

    function atualizarTimer() {
        const m = Math.floor(tempoRestante / 60);
        const s = tempoRestante % 60;
        document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }

    function iniciarVerificacaoAutomatica() {
        verificacaoInterval = setInterval(async () => {
            if (verificando) return;
            verificando = true;
            try {
                const encontrado = await Auth.verifyMotto(nickAtual, codigoAtual);
                if (encontrado) {
                    const resultado = await Auth.verificarEAtivar(nickAtual, codigoAtual);
                    if (resultado.success) {
                        clearInterval(verificacaoInterval);
                        clearInterval(timerInterval);
                        document.getElementById('step2').classList.remove('active');
                        document.getElementById('step3').classList.add('active');
                        document.getElementById('cardTitle').textContent = 'Conta criada!';
                        document.getElementById('cardSub').textContent = 'Redirecionando...';
                        setTimeout(async () => {
                            const loginResult = await Auth.login(nickAtual, senhaAtual);
                            window.location.href = loginResult.success ? 'home.html' : 'index.html';
                        }, 2000);
                    }
                }
            } catch(e) {
            } finally {
                verificando = false;
            }
        }, 5000);
    }

    function showError(msg) {
        const box = document.getElementById('errorMessage');
        document.getElementById('errorText').textContent = msg;
        box.classList.add('show');
        setTimeout(() => box.classList.remove('show'), 4000);
    }

    document.addEventListener('keypress', e => {
        if (e.key === 'Enter' && document.getElementById('step1').classList.contains('active')) criarConta();
    });
</script>
</body>
</html>
